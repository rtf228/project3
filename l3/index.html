<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
    <style>
     
    </style>
</head>
<style>
    .ex{
        font-size: 30px;
        width: 20px;
        height: 150px;
        background-color: red;
        position: absolute;
        left: 0;
        top: 50%;
        border-radius: 10px;
        animation: anim 15s linear infinite;
        
    }

    .ex:hover{
        animation-name: anim;
    
        

    }
    @keyframes anim {
        0%{
            left: 0;
        }

        12.5%{
            height: 50px;
        }

         25%{
            height: 150px;
        }

        37.5%{
            height: 50px;

        }

        50%{
            height: 150px;
        }
        62.5%{
            height: 50px;
        }
         75%{
            height: 150px;
        }

        85.5%{
            height: 50px;
        }
        
        100%{
            left: 150%;
            height: 150px;
        }
    }
</style>
<body>
    <span class="ex"></span>
</body>
</html>
